name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint (flake8)
        run: |
          flake8 src tests --max-line-length=100 --extend-ignore=E203,W503

      - name: Run tests
        run: |
          pytest -q

      - name: Train on committed data and sanity-check metrics
        run: |
          sepsis-ml train
          python -c "
          import json
          m = json.load(open('reports/sepsis_metrics.json'))
          leaked = {'diagnosis_Heart Failure','diagnosis_Normal','diagnosis_Pneumonia','diagnosis_Sepsis','mortality','readmission_30d'}
          assert leaked.isdisjoint(set(m['feature_columns'])), 'leakage column found in trained features!'
          assert m['cv_roc_auc_mean'] < 0.999, 'suspiciously perfect AUC -- check for leakage'
          print('OK:', m['cv_roc_auc_mean'], m['cv_pr_auc_mean'])
          "
